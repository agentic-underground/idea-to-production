<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Items Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* base neutrals — cool, deep navy */
      --bg-0: #070b16;
      --bg-1: #0b1120;
      --surface: rgba(20, 28, 48, 0.55);
      --surface-2: rgba(28, 38, 62, 0.6);
      --border: rgba(120, 140, 175, 0.14);
      --border-strong: rgba(120, 140, 175, 0.28);
      --text-0: #f3f6fc;
      --text-1: #c4cee0;
      --text-2: #8794ad;
      --text-3: #5b6884;

      /* status accents — shared chroma, varied hue */
      --do: #5b9dff;
      --do-glow: rgba(91, 157, 255, 0.5);
      --doing: #f5b13d;
      --doing-glow: rgba(245, 177, 61, 0.5);
      --done: #2dd4a7;
      --done-glow: rgba(45, 212, 167, 0.5);
      --danger: #fb6a5e;

      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-0);
      background-image:
        radial-gradient(1100px 600px at 12% -8%, rgba(91, 157, 255, 0.10), transparent 60%),
        radial-gradient(1000px 600px at 88% -10%, rgba(45, 212, 167, 0.08), transparent 60%),
        radial-gradient(1200px 700px at 50% 120%, rgba(245, 177, 61, 0.05), transparent 60%);
      color: var(--text-1);
      height: 100vh;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    ::selection { background: rgba(91, 157, 255, 0.3); }

    /* ---------- Header ---------- */
    .header {
      margin-bottom: 24px;
      flex: 0 0 auto;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 18px;
    }

    .header h1 {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.6px;
      color: var(--text-0);
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-3);
      font-weight: 500;
    }

    .progress-bar-container {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .progress-legend {
      display: flex;
      gap: 16px;
      flex: 0 0 auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--text-2);
      text-transform: uppercase;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-dot.todo { background: var(--do); box-shadow: 0 0 8px var(--do-glow); }
    .legend-dot.doing { background: var(--doing); box-shadow: 0 0 8px var(--doing-glow); }
    .legend-dot.done { background: var(--done); box-shadow: 0 0 8px var(--done-glow); }

    .progress-bar {
      flex: 1;
      height: 10px;
      background: rgba(120, 140, 175, 0.12);
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      gap: 2px;
      padding: 0;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
    }

    .progress-segment {
      height: 100%;
      transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 999px;
    }

    .progress-segment.todo { background: linear-gradient(90deg, #4789f0, var(--do)); }
    .progress-segment.doing { background: linear-gradient(90deg, #e89a28, var(--doing)); }
    .progress-segment.done { background: linear-gradient(90deg, #1fc096, var(--done)); box-shadow: 0 0 14px var(--done-glow); }

    .progress-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 58px;
      height: 32px;
      padding: 0 12px;
      background: linear-gradient(135deg, rgba(45, 212, 167, 0.18), rgba(45, 212, 167, 0.08));
      border: 1px solid rgba(45, 212, 167, 0.32);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--done);
      flex: 0 0 auto;
    }

    /* ---------- Board layout ---------- */
    .main-container {
      display: flex;
      gap: 22px;
      flex: 1;
      min-height: 0;
    }

    .board-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      flex: 1;
      min-height: 0;
      min-width: 0;
    }

    .column {
      --accent: var(--text-2);
      --accent-glow: rgba(120,140,175,0.4);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px 16px;
      min-height: 0;
      min-width: 0;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .column::before {
      content: '';
      position: absolute;
      top: 0; left: 18px; right: 18px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 14px var(--accent-glow);
      opacity: 0.8;
    }

    .column[data-column="DO"] { --accent: var(--do); --accent-glow: var(--do-glow); }
    .column[data-column="DOING"] { --accent: var(--doing); --accent-glow: var(--doing-glow); }
    .column[data-column="DONE"] { --accent: var(--done); --accent-glow: var(--done-glow); }

    .column.drop-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 12px 40px -12px var(--accent-glow);
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 2px 4px 14px;
      border-bottom: 1px solid var(--border);
    }

    .column-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .column-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }

    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
      padding: 2px 6px 2px 2px;
      min-height: 40px;
    }

    .cards-container::-webkit-scrollbar { width: 7px; }
    .cards-container::-webkit-scrollbar-track { background: transparent; }
    .cards-container::-webkit-scrollbar-thumb {
      background: rgba(120, 140, 175, 0.22);
      border-radius: 4px;
    }
    .cards-container::-webkit-scrollbar-thumb:hover { background: rgba(120, 140, 175, 0.4); }

    /* ---------- Cards ---------- */
    .card {
      --accent: var(--text-2);
      --accent-glow: rgba(120,140,175,0.4);
      position: relative;
      background: linear-gradient(150deg, var(--surface-2), rgba(14, 20, 36, 0.72));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 16px 14px 18px;
      cursor: grab;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), border-color 0.22s, box-shadow 0.22s;
      user-select: none;
      word-wrap: break-word;
      overflow-wrap: break-word;
      overflow: hidden;
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { animation: cardIn 0.4s ease both; }
      @keyframes cardIn {
        from { transform: translateY(9px); }
        to { transform: translateY(0); }
      }
    }

    .card[data-status="DO"] { --accent: var(--do); --accent-glow: var(--do-glow); }
    .card[data-status="DOING"] { --accent: var(--doing); --accent-glow: var(--doing-glow); }
    .card[data-status="DONE"] { --accent: var(--done); --accent-glow: var(--done-glow); }

    .card::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 3px;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .card:hover {
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      transform: translateY(-3px);
      box-shadow: 0 14px 34px -16px rgba(0,0,0,0.8), 0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .card.dragging {
      opacity: 0.45;
      cursor: grabbing;
      transform: scale(0.98) rotate(-1deg);
    }

    .card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 16px 40px -18px var(--accent-glow);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-pr-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      margin-left: auto;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 14.5px;
      font-weight: 600;
      line-height: 1.38;
      margin-bottom: 13px;
      color: var(--text-0);
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: color 0.18s;
    }

    .card-title:hover { color: var(--accent); }

    .card-itemcount {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--text-2);
      margin-bottom: 13px;
      font-weight: 500;
    }

    .card-itemcount .chev {
      transition: transform 0.25s;
      font-size: 9px;
      color: var(--text-3);
    }
    .card-itemcount.open .chev { transform: rotate(90deg); }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-meta-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-3);
    }

    .card-tok {
      padding: 2px 7px;
      background: rgba(120,140,175,0.1);
      border-radius: 5px;
      letter-spacing: 0.3px;
    }

    .card-model {
      color: var(--text-2);
      font-weight: 500;
    }

    .card-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 15px;
      background: var(--accent);
      color: #06101e;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
    }

    .card-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 6px 16px -6px var(--accent-glow);
    }

    .card.redo-marker { --accent: var(--danger); --accent-glow: rgba(251, 106, 94, 0.5); }

    .card.redo-marker .redo-flag {
      display: inline-flex;
    }

    .redo-flag {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: color-mix(in srgb, var(--danger) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--danger) 36%, transparent);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.8px;
      color: var(--danger);
    }

    .epic-items {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 2px;
    }

    .epic-items.expanded { display: flex; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 7px;
      font-size: 12.5px;
      color: var(--text-1);
      cursor: pointer;
      transition: background 0.16s, color 0.16s;
    }

    .item-row::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
      opacity: 0.7;
    }

    .item-row:hover {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--text-0);
    }

    /* ---------- RHS Panel ---------- */
    .rhs-panel {
      width: 35%;
      max-width: 480px;
      min-width: 400px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      min-height: 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .rhs-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      color: var(--text-2);
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .rhs-header .ctx {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.5px;
      color: var(--text-3);
      text-transform: none;
      font-weight: 500;
    }

    .rhs-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .rhs-panel-section {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(10, 16, 30, 0.5);
      min-height: 0;
      overflow: hidden;
    }

    /* primary (description) section — grows large */
    .rhs-panel-section.primary { flex: 1 1 60%; }
    /* secondary (list) section — grows smaller */
    .rhs-panel-section.secondary { flex: 1 1 40%; }

    .rhs-section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
      background: rgba(255,255,255,0.012);
    }

    .rhs-section-title {
      font-family: var(--font-head);
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-2);
    }

    .rhs-section-pill {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(120,140,175,0.12);
      color: var(--text-2);
    }

    .rhs-section-body {
      padding: 14px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .rhs-section-body::-webkit-scrollbar { width: 7px; }
    .rhs-section-body::-webkit-scrollbar-track { background: transparent; }
    .rhs-section-body::-webkit-scrollbar-thumb {
      background: rgba(120, 140, 175, 0.22);
      border-radius: 4px;
    }

    .pr-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-0);
      margin-bottom: 12px;
      line-height: 1.35;
      letter-spacing: -0.2px;
    }

    .pr-meta {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .pr-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .pr-meta-label {
      color: var(--text-3);
      font-weight: 600;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      min-width: 64px;
    }

    .pr-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      background: rgba(91, 157, 255, 0.12);
      border: 1px solid rgba(91, 157, 255, 0.24);
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--do);
    }

    .pr-assignee {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-1);
    }

    .avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 700;
      color: #06101e;
    }

    .pr-description {
      font-size: 13px;
      line-height: 1.62;
      color: var(--text-1);
      word-wrap: break-word;
    }

    .pr-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--do);
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid rgba(91,157,255,0.22);
      border-radius: 8px;
      transition: background 0.18s;
    }
    .pr-link:hover { background: rgba(91,157,255,0.1); }

    .panel-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.16s;
      border: 1px solid transparent;
    }

    .panel-item-row:hover {
      background: rgba(91, 157, 255, 0.08);
      border-color: rgba(91,157,255,0.18);
    }

    .panel-item-num {
      width: 22px; height: 22px;
      flex: 0 0 auto;
      border-radius: 6px;
      background: rgba(120,140,175,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
    }

    .panel-item-text {
      font-size: 13px;
      color: var(--text-1);
      font-weight: 500;
      line-height: 1.35;
    }

    .panel-item-row:hover .panel-item-text { color: var(--text-0); }
    .panel-item-arrow { margin-left: auto; color: var(--text-3); font-size: 14px; flex: 0 0 auto; }

    .commit-item {
      display: flex;
      gap: 11px;
      padding: 11px 2px;
      border-bottom: 1px solid var(--border);
      cursor: default;
    }
    .commit-item:last-child { border-bottom: none; }

    .commit-graph {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
      padding-top: 4px;
    }

    .commit-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--do);
      box-shadow: 0 0 8px rgba(91,157,255,0.5);
      flex: 0 0 auto;
    }

    .commit-line {
      width: 2px;
      flex: 1;
      background: var(--border-strong);
      margin-top: 3px;
      min-height: 8px;
    }
    .commit-item:last-child .commit-line { display: none; }

    .commit-body { flex: 1; min-width: 0; }

    .commit-hash {
      font-family: var(--font-mono);
      color: var(--do);
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .commit-message {
      color: var(--text-1);
      line-height: 1.5;
      font-size: 12.5px;
      word-wrap: break-word;
    }

    .rhs-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 100%;
      color: var(--text-3);
      font-size: 13px;
      text-align: center;
      flex: 1;
    }

    .rhs-empty svg { opacity: 0.5; }

    .redo-note {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: rgba(251, 106, 94, 0.08);
      border: 1px solid rgba(251, 106, 94, 0.24);
      border-radius: 10px;
      flex: 0 0 auto;
    }

    .redo-note-icon { color: var(--danger); flex: 0 0 auto; margin-top: 1px; }
    .redo-note-label {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 5px;
    }
    .redo-note-text { font-size: 12.5px; line-height: 1.5; color: var(--text-1); }

    /* ---------- Modal ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 7, 14, 0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal {
      background: linear-gradient(160deg, #121a2e, #0c1322);
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 26px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.8);
      transform: translateY(12px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal-overlay.active .modal { transform: translateY(0) scale(1); }

    .modal-icon {
      width: 42px; height: 42px;
      border-radius: 11px;
      background: color-mix(in srgb, var(--danger) 16%, transparent);
      border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--danger);
      margin-bottom: 16px;
    }

    .modal h2 {
      font-family: var(--font-head);
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-0);
      letter-spacing: -0.3px;
    }

    .modal p {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 18px;
      line-height: 1.55;
    }

    .modal .move-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-family: var(--font-mono);
      font-size: 11.5px;
    }

    .move-chip {
      padding: 4px 10px;
      border-radius: 7px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .move-chip.from { background: color-mix(in srgb, var(--done) 16%, transparent); color: var(--done); }
    .move-chip.to { background: color-mix(in srgb, var(--do) 16%, transparent); color: var(--do); }
    .move-arrow { color: var(--text-3); }

    .modal label {
      display: block;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .modal textarea {
      width: 100%;
      padding: 13px 14px;
      background: rgba(8, 13, 24, 0.8);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-0);
      font-family: var(--font-body);
      font-size: 13.5px;
      line-height: 1.5;
      resize: vertical;
      min-height: 110px;
      margin-bottom: 8px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .modal textarea::placeholder { color: var(--text-3); }
    .modal textarea:focus {
      outline: none;
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(251, 106, 94, 0.12);
    }

    .modal-validation {
      font-size: 11.5px;
      color: var(--danger);
      margin-bottom: 14px;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .modal-validation.show { opacity: 1; }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-button {
      padding: 11px 20px;
      border: none;
      border-radius: 9px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s, background 0.15s;
    }

    .modal-button:hover { transform: translateY(-1px); }

    .modal-button.cancel {
      background: rgba(120, 140, 175, 0.12);
      color: var(--text-1);
      border: 1px solid var(--border);
    }
    .modal-button.cancel:hover { background: rgba(120, 140, 175, 0.2); }

    .modal-button.submit {
      background: var(--danger);
      color: #1a0604;
    }
    .modal-button.submit:hover { filter: brightness(1.08); }

    @media (max-width: 1180px) {
      .rhs-panel { min-width: 340px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>Job Items Board</h1>
      <span class="header-sub">EPIC &amp; item flow tracking</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-legend">
        <span class="legend-item"><span class="legend-dot todo"></span>Do</span>
        <span class="legend-item"><span class="legend-dot doing"></span>Doing</span>
        <span class="legend-item"><span class="legend-dot done"></span>Done</span>
      </div>
      <div class="progress-bar">
        <div class="progress-segment todo" id="todo-segment"></div>
        <div class="progress-segment doing" id="doing-segment"></div>
        <div class="progress-segment done" id="done-segment"></div>
      </div>
      <div class="progress-badge" id="progress-badge">0%</div>
    </div>
  </div>

  <div class="main-container">
    <div class="board-section">
      <div class="board">
        <div class="column" data-column="DO">
          <div class="column-header">
            <span class="column-title">DO</span>
            <span class="column-count">0</span>
          </div>
          <div class="cards-container" data-column-container="DO"></div>
        </div>

        <div class="column" data-column="DOING">
          <div class="column-header">
            <span class="column-title">DOING</span>
            <span class="column-count">0</span>
          </div>
          <div class="cards-container" data-column-container="DOING"></div>
        </div>

        <div class="column" data-column="DONE">
          <div class="column-header">
            <span class="column-title">DONE</span>
            <span class="column-count">0</span>
          </div>
          <div class="cards-container" data-column-container="DONE"></div>
        </div>
      </div>
    </div>

    <div class="rhs-panel">
      <div class="rhs-header">
        <span>Details</span>
        <span class="ctx" id="rhs-ctx"></span>
      </div>
      <div class="rhs-content" id="rhs-content">
        <div class="rhs-empty">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h6"/></svg>
          <span>Select an EPIC or item to<br>view its details</span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="redo-modal">
    <div class="modal">
      <div class="modal-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </div>
      <h2>Reason for redo</h2>
      <p>Moving an item back out of Done requires a note explaining why. This is attached to the item.</p>
      <div class="move-summary" id="move-summary"></div>
      <label for="redo-comment">Explanation</label>
      <textarea id="redo-comment" placeholder="e.g. Failing edge-case in the reconnect handler — needs rework before merge…"></textarea>
      <div class="modal-validation" id="redo-validation">A reason is required to move this item.</div>
      <div class="modal-buttons">
        <button class="modal-button cancel" onclick="closeRedoModal()">Cancel</button>
        <button class="modal-button submit" onclick="submitRedoComment()">Move &amp; attach note</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- Sample data ----------
    const epics = [
      {
        id: 'epic-1', type: 'EPIC',
        title: 'Flow-Tracking Governance UI',
        column: 'DO',
        description: 'Implement a comprehensive governance UI for tracking flows across the system. This epic covers the design, implementation, and testing of all flow-tracking features including real-time status updates, role-based access control, and audit logging capabilities. The solution must support multiple concurrent flows with proper state management and error recovery.',
        pr: { num: 123, title: 'feat: implement flow tracking governance', url: 'https://github.com/example/repo/pull/123', labels: ['feature', 'ui'], assignees: ['alice', 'bob'] },
        items: [
          { id: 'item-1-1', title: 'Design flow tracking components', description: 'Create the core UI components for displaying flow information. This includes the flow card component, status badge, progress indicator, and action buttons. Must follow the design system and support dark/light modes. Components should be fully accessible with ARIA labels and keyboard navigation support.', commits: [ { hash: 'a1b2c3d', message: 'Add FlowTracker component with state management' }, { hash: 'e4f5g6h', message: 'Style tracking UI with Tailwind' }, { hash: 'k9l0m1n', message: 'Add accessibility attributes and keyboard support' } ] },
          { id: 'item-1-2', title: 'Implement flow state machine', description: 'Build the state machine that manages flow transitions. Must handle all valid state transitions, prevent invalid state changes, and provide hooks for state change listeners. Include comprehensive error handling and recovery mechanisms for edge cases.', commits: [ { hash: 'i7j8k9l', message: 'Create state machine for flow transitions' }, { hash: 'm0n1o2p', message: 'Add state validation and error handling' }, { hash: 'o2p3q4r', message: 'Implement transition hooks and listeners' } ] },
          { id: 'item-1-3', title: 'Add real-time status updates', description: 'Implement WebSocket connection for real-time flow status updates. Must handle reconnection, message queuing, and proper cleanup on disconnect. Status updates should be batched for performance.', commits: [ { hash: 's5t6u7v', message: 'Setup WebSocket client for status updates' }, { hash: 'w8x9y0z', message: 'Implement message batching and queuing' } ] }
        ]
      },
      {
        id: 'epic-2', type: 'EPIC',
        title: 'Process-Documentation & Git Governance',
        column: 'DONE',
        description: 'Establish comprehensive documentation standards and governance policies for the repository. This includes creating templates, style guides, and automated checks to ensure consistency. The process will emerge iteratively as we build, with documentation reflecting actual workflows rather than theoretical models.',
        pr: { num: 115, title: 'docs: add process documentation and governance', url: 'https://github.com/example/repo/pull/115', labels: ['documentation', 'process'], assignees: ['charlie'] },
        items: [
          { id: 'item-2-1', title: 'Write contributor guidelines', description: 'Create comprehensive contributor guidelines covering setup, development workflow, testing requirements, and submission process. Include examples of good commit messages, PR descriptions, and code review etiquette.', commits: [ { hash: 'q3r4s5t', message: 'Initial draft of contributor guidelines' }, { hash: 'u6v7w8x', message: 'Add examples and common workflows' }, { hash: 'ab12cd34', message: 'Include troubleshooting section and FAQ' } ] },
          { id: 'item-2-2', title: 'Create documentation templates', description: 'Develop reusable templates for README, API docs, and feature specs. Templates should include sections for context, requirements, implementation notes, and testing. Make templates easy to fork and customize.', commits: [ { hash: 'ef56gh78', message: 'Create base README template' }, { hash: 'ij90kl12', message: 'Add API documentation template' } ] }
        ]
      },
      {
        id: 'epic-3', type: 'EPIC',
        title: 'SVG Flow Canvas — Interactive Visualization',
        column: 'DOING',
        description: 'Build an interactive SVG-based canvas for visualizing flow relationships. Supports dragging nodes, creating/editing connections, and displaying flow properties. Must handle large graphs efficiently with proper zoom and pan capabilities. The canvas should be embeddable and themeable.',
        pr: { num: 128, title: 'feat: add SVG flow canvas visualization', url: 'https://github.com/example/repo/pull/128', labels: ['feature', 'visualization'], assignees: ['diana', 'eve'] },
        items: [
          { id: 'item-3-1', title: 'Create SVG flow nodes', description: 'Design and implement SVG-based flow nodes with proper styling, labels, and property display. Nodes should be draggable and support custom icons/colors based on flow type.', commits: [ { hash: 'mn34op56', message: 'Create base SVG node component' }, { hash: 'qr78st90', message: 'Add drag interaction handler' } ] },
          { id: 'item-3-2', title: 'Implement curved connectors', description: 'Create smooth curved connectors between nodes using cubic Bezier curves. Support labels on connectors and highlight active paths. Handle self-loops and multi-edge cases properly.', commits: [ { hash: 'uv12wx34', message: 'Implement cubic Bezier path calculations' }, { hash: 'yz56ab78', message: 'Add connector styling and labels' } ] },
          { id: 'item-3-3', title: 'Add zoom and pan', description: 'Implement smooth zoom and pan controls for navigating large flow diagrams. Support keyboard shortcuts and touch gestures. Preserve aspect ratio and prevent over-zooming.', commits: [ { hash: 'cd90ef12', message: 'Setup SVG transform handlers for zoom/pan' } ] }
        ]
      },
      {
        id: 'epic-4', type: 'EPIC',
        title: 'Carriage Agent + Token Telemetry',
        column: 'DO',
        description: 'Implement telemetry for tracking token usage across all agents. The carriage agent serves as the central hub for routing requests and collecting metrics. All telemetry must be low-overhead and configurable for different log levels.',
        pr: { num: 130, title: 'feat: add carriage agent and token telemetry', url: 'https://github.com/example/repo/pull/130', labels: ['feature', 'telemetry'], assignees: ['frank'] },
        items: [
          { id: 'item-4-1', title: 'Build carriage agent router', description: 'Create the main carriage agent that routes requests to appropriate handlers. Must support middleware chain, error recovery, and request/response logging with configurable verbosity.', commits: [ { hash: 'gh34ij56', message: 'Implement agent router with middleware' }, { hash: 'kl78mn90', message: 'Add request/response logging' } ] },
          { id: 'item-4-2', title: 'Track token usage', description: 'Collect detailed token usage metrics including input tokens, output tokens, and cost estimation. Store metrics in structured JSON format for analysis and reporting.', commits: [ { hash: 'op12qr34', message: 'Add token counter middleware' }, { hash: 'st56uv78', message: 'Implement metric storage' } ] }
        ]
      },
      {
        id: 'epic-5', type: 'EPIC',
        title: 'Issues as Process Documentation',
        column: 'DONE',
        description: 'Use GitHub issues as the primary vehicle for documenting processes. Each issue represents a discrete process step with structured metadata. Issues automatically link to related PRs and code changes, creating a living documentation system that stays in sync with actual changes.',
        pr: { num: 118, title: 'docs: use issues for process documentation', url: 'https://github.com/example/repo/pull/118', labels: ['documentation', 'process'], assignees: ['grace'] },
        items: [
          { id: 'item-5-1', title: 'Create issue templates', description: 'Design and implement issue templates that capture required metadata for process documentation. Include sections for prerequisites, steps, expected outcomes, and rollback procedures.', commits: [ { hash: 'wx90yz12', message: 'Create issue template structure' }, { hash: 'ab34cd56', message: 'Add validation for template fields' } ] },
          { id: 'item-5-2', title: 'Link issues to PRs', description: 'Implement automatic linking between issues and their corresponding PRs. Use GitHub API to create bidirectional references and keep metadata in sync.', commits: [ { hash: 'ef78gh90', message: 'Implement issue-PR linking logic' } ] }
        ]
      }
    ];

    const AVATAR_COLORS = ['#5b9dff', '#2dd4a7', '#f5b13d', '#c084fc', '#fb6a5e', '#38bdf8', '#34d399'];
    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }

    let draggedCard = null;
    let draggedFrom = null;
    let selectedCardEl = null;
    let pendingRedoCard = null;
    let pendingRedoTarget = null;

    // ---------- Card rendering ----------
    function createCardElement(epic) {
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.epicId = epic.id;
      card.dataset.status = epic.column;

      const itemsHtml = epic.items.map(item =>
        `<div class="item-row" data-item-id="${item.id}">${item.title}</div>`
      ).join('');

      card.innerHTML = `
        <div class="card-top">
          <span class="card-type-badge">EPIC</span>
          <span class="redo-flag">↩ REDO</span>
          <span class="card-pr-num">#${epic.pr.num}</span>
        </div>
        <div class="card-title">${epic.title}</div>
        <div class="card-itemcount"><span class="chev">▶</span>${epic.items.length} item${epic.items.length === 1 ? '' : 's'}</div>
        <div class="card-footer">
          <span class="card-meta-left">
            <span class="card-tok">0 tok</span>
            <span class="card-model">sonnet</span>
          </span>
          <button class="card-button">GO</button>
        </div>
        <div class="epic-items">${itemsHtml}</div>
      `;

      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragend', handleDragEnd);

      // Title → select epic in RHS
      card.querySelector('.card-title').addEventListener('click', (e) => {
        e.stopPropagation();
        selectCard(card, epic);
      });

      // Item count → expand/collapse
      const itemCount = card.querySelector('.card-itemcount');
      itemCount.addEventListener('click', (e) => {
        e.stopPropagation();
        card.querySelector('.epic-items').classList.toggle('expanded');
        itemCount.classList.toggle('open');
      });

      // Inline item rows → show item details
      card.querySelectorAll('.item-row').forEach(row => {
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          const item = epic.items.find(i => i.id === row.dataset.itemId);
          if (item) { selectCard(card, epic); displayItemDetails(epic, item); }
        });
      });

      return card;
    }

    function selectCard(cardEl, epic) {
      if (selectedCardEl) selectedCardEl.classList.remove('selected');
      selectedCardEl = cardEl;
      cardEl.classList.add('selected');
      displayEpicDetails(epic, cardEl);
    }

    // ---------- RHS: EPIC view ----------
    function displayEpicDetails(epic, cardEl) {
      const rhsContent = document.getElementById('rhs-content');
      document.getElementById('rhs-ctx').textContent = 'EPIC · #' + epic.pr.num;

      const labels = epic.pr.labels.map(l => `<span class="pr-badge">${l}</span>`).join(' ');
      const assignees = epic.pr.assignees.map(a =>
        `<span class="pr-assignee"><span class="avatar" style="background:${avatarColor(a)}">${a.slice(0,2).toUpperCase()}</span>${a}</span>`
      ).join(' ');

      const redoComment = cardEl && cardEl.dataset.redoComment;
      const redoHtml = redoComment ? `
        <div class="redo-note">
          <span class="redo-note-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </span>
          <div>
            <div class="redo-note-label">Redo reason</div>
            <div class="redo-note-text">${redoComment}</div>
          </div>
        </div>` : '';

      rhsContent.innerHTML = `
        ${redoHtml}
        <div class="rhs-panel-section primary">
          <div class="rhs-section-head">
            <span class="rhs-section-title">Pull Request</span>
            <span class="rhs-section-pill">#${epic.pr.num}</span>
          </div>
          <div class="rhs-section-body">
            <div class="pr-title">${epic.pr.title}</div>
            <div class="pr-meta">
              <div class="pr-meta-item"><span class="pr-meta-label">Labels</span>${labels}</div>
              <div class="pr-meta-item"><span class="pr-meta-label">Assignees</span>${assignees}</div>
            </div>
            <div class="pr-description">${epic.description}</div>
            <a class="pr-link" href="${epic.pr.url}" target="_blank">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14 21 3"/></svg>
              View on GitHub
            </a>
          </div>
        </div>
        <div class="rhs-panel-section secondary">
          <div class="rhs-section-head">
            <span class="rhs-section-title">Items in this EPIC</span>
            <span class="rhs-section-pill">${epic.items.length}</span>
          </div>
          <div class="rhs-section-body">
            ${epic.items.map((item, i) => `
              <div class="panel-item-row" data-item-id="${item.id}">
                <span class="panel-item-num">${String(i+1).padStart(2,'0')}</span>
                <span class="panel-item-text">${item.title}</span>
                <span class="panel-item-arrow">›</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      rhsContent.querySelectorAll('.panel-item-row').forEach(row => {
        row.addEventListener('click', () => {
          const item = epic.items.find(i => i.id === row.dataset.itemId);
          if (item) displayItemDetails(epic, item);
        });
      });
    }

    // ---------- RHS: ITEM view ----------
    function displayItemDetails(epic, item) {
      const rhsContent = document.getElementById('rhs-content');
      document.getElementById('rhs-ctx').textContent = 'ITEM · ' + epic.pr.num;

      const commitsHtml = item.commits.map(c => `
        <div class="commit-item">
          <div class="commit-graph"><span class="commit-dot"></span><span class="commit-line"></span></div>
          <div class="commit-body">
            <div class="commit-hash">${c.hash}</div>
            <div class="commit-message">${c.message}</div>
          </div>
        </div>
      `).join('');

      rhsContent.innerHTML = `
        <div class="rhs-panel-section primary">
          <div class="rhs-section-head">
            <span class="rhs-section-title">Issue</span>
            <button class="rhs-section-pill" style="cursor:pointer;border:none;font-family:var(--font-mono)" onclick="backToEpic('${epic.id}')">‹ EPIC</button>
          </div>
          <div class="rhs-section-body">
            <div class="pr-title">${item.title}</div>
            <div class="pr-description">${item.description}</div>
          </div>
        </div>
        <div class="rhs-panel-section secondary">
          <div class="rhs-section-head">
            <span class="rhs-section-title">Commits</span>
            <span class="rhs-section-pill">${item.commits.length}</span>
          </div>
          <div class="rhs-section-body">${commitsHtml}</div>
        </div>
      `;
    }

    function backToEpic(epicId) {
      const epic = epics.find(e => e.id === epicId);
      const cardEl = document.querySelector(`.card[data-epic-id="${epicId}"]`);
      if (epic) displayEpicDetails(epic, cardEl);
    }

    // ---------- Drag & drop ----------
    function handleDragStart(e) {
      draggedCard = this;
      draggedFrom = this.parentElement;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drop-active'));
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.closest('.column').classList.add('drop-active');
    }

    function handleDragLeave(e) {
      const col = this.closest('.column');
      if (!col.contains(e.relatedTarget)) col.classList.remove('drop-active');
    }

    function handleDrop(e) {
      e.preventDefault();
      this.closest('.column').classList.remove('drop-active');
      if (!draggedCard) return;

      const targetColumn = this.getAttribute('data-column-container');
      const wasInDone = draggedFrom.getAttribute('data-column-container') === 'DONE';
      const movingToDoOrDoing = targetColumn === 'DO' || targetColumn === 'DOING';

      if (wasInDone && movingToDoOrDoing) {
        pendingRedoCard = draggedCard;
        pendingRedoTarget = this;
        document.getElementById('move-summary').innerHTML =
          `<span class="move-chip from">DONE</span><span class="move-arrow">→</span><span class="move-chip to">${targetColumn}</span>`;
        document.getElementById('redo-modal').classList.add('active');
        document.getElementById('redo-comment').focus();
        return;
      }

      moveCard(draggedCard, this);
    }

    function moveCard(card, container) {
      const status = container.getAttribute('data-column-container');
      container.appendChild(card);
      card.dataset.status = status;

      const epic = epics.find(e => e.id === card.dataset.epicId);
      if (epic) epic.column = status;

      // Leaving DONE clears any prior redo mark only if NOT going back (handled in submit)
      updateColumnCounts();
      updateProgressBar();
    }

    // ---------- Redo modal ----------
    function closeRedoModal() {
      document.getElementById('redo-modal').classList.remove('active');
      document.getElementById('redo-comment').value = '';
      document.getElementById('redo-validation').classList.remove('show');
      pendingRedoCard = null;
      pendingRedoTarget = null;
    }

    function submitRedoComment() {
      const ta = document.getElementById('redo-comment');
      const comment = ta.value.trim();
      if (!comment) {
        document.getElementById('redo-validation').classList.add('show');
        ta.focus();
        return;
      }
      pendingRedoCard.dataset.redoComment = comment;
      moveCard(pendingRedoCard, pendingRedoTarget);
      pendingRedoCard.classList.add('redo-marker');

      // If this card is currently shown in RHS, refresh to surface the note
      if (selectedCardEl === pendingRedoCard) {
        const epic = epics.find(e => e.id === pendingRedoCard.dataset.epicId);
        if (epic) displayEpicDetails(epic, pendingRedoCard);
      }
      closeRedoModal();
    }

    document.getElementById('redo-comment').addEventListener('input', () => {
      document.getElementById('redo-validation').classList.remove('show');
    });
    document.getElementById('redo-modal').addEventListener('click', (e) => {
      if (e.target.id === 'redo-modal') closeRedoModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeRedoModal();
    });

    // ---------- Counts & progress ----------
    function updateColumnCounts() {
      document.querySelectorAll('[data-column]').forEach(column => {
        const count = column.querySelector('[data-column-container]').querySelectorAll('.card').length;
        column.querySelector('.column-count').textContent = count;
      });
    }

    function updateProgressBar() {
      const counts = ['DO','DOING','DONE'].map(c =>
        document.querySelector(`[data-column-container="${c}"]`).querySelectorAll('.card').length);
      const [doC, doingC, doneC] = counts;
      const total = doC + doingC + doneC;
      const seg = { todo: document.getElementById('todo-segment'), doing: document.getElementById('doing-segment'), done: document.getElementById('done-segment') };
      const badge = document.getElementById('progress-badge');
      if (total === 0) {
        seg.todo.style.flex = '1'; seg.doing.style.flex = '0'; seg.done.style.flex = '0';
        badge.textContent = '0%';
      } else {
        seg.todo.style.flex = doC; seg.doing.style.flex = doingC; seg.done.style.flex = doneC;
        badge.textContent = Math.round((doneC / total) * 100) + '%';
      }
    }

    // ---------- Init ----------
    document.querySelectorAll('[data-column-container]').forEach(container => {
      container.addEventListener('dragover', handleDragOver);
      container.addEventListener('dragleave', handleDragLeave);
      container.addEventListener('drop', handleDrop);
    });

    epics.forEach((epic, i) => {
      const column = document.querySelector(`[data-column="${epic.column}"] [data-column-container]`);
      const cardEl = createCardElement(epic);
      cardEl.style.animationDelay = (i * 0.05) + 's';
      column.appendChild(cardEl);
    });

    updateColumnCounts();
    updateProgressBar();
  </script>
</body>
</html>
