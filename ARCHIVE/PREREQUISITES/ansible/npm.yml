# ansible/npm.yml — global npm tools (assumes node/npm present; see core-bootstrap.yml).
# Uses community.general.npm with global: true. Idempotent.
---
- name: Global npm tools
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop:
    - playwright                        # foundry Playwright test runner (committed STORY tests; NOT a browser MCP)
    - "@mermaid-js/mermaid-cli"         # publish: mmdc
    - typescript-language-server        # foundry LSP (JS/TS)
    - typescript                        # peer of the TS language server
    - pyright                           # foundry LSP (Python) — provides pyright-langserver
  tags: [foundry, publish, lsp, mcp]

- name: Install the Chromium browser for the Playwright test runner
  ansible.builtin.command: npx --yes playwright install --with-deps chromium
  register: pw
  changed_when: "'downloading' in pw.stdout | lower"
  tags: [foundry, playwright]
# ONE BROWSER: the marketplace ships no browser MCP — the host-provided chrome-devtools MCP drives the
# system Chromium (apt-managed). This step installs a browser only for the Playwright STORY-test runner.
# The Context7 MCP (foundry) launches ephemerally via `npx -y @upstash/context7-mcp` (no install needed,
# keyless by default); ensuring node/npm is present is the only requirement. Same for optional npx-based
# MCPs (Tavily, Exa) — their API keys are runtime env, never stored in the playbook.
