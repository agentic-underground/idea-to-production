<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="DejaVu Sans, sans-serif">
  <title>The KAIZEN covenant — continuous improvement (halve the distance to perfection)</title>
  <desc>The KAIZEN self-improvement covenant, illustrated in two linked motifs. LEFT — the prime law "halve the distance to perfection": a row of rising bars (v1…v5), each closing half of the remaining gap up to a dashed "perfection" line it never quite reaches, because the obligation is the rate of approach. RIGHT — the PDCA engine that drives each pass: a clockwise ring of Plan, Do, Check, Act, meaning change against a measured hypothesis rather than a hunch. A footer band names the kaizen principles — standardize-then-improve, small reversible steps, gemba (go and see), fix-upstream-once, self-cleaving — and the duty to eliminate the three losses: muda (waste), mura (unevenness), and muri (overburden). Dark-mode, transparent background, in the house accent palette.</desc>

  <defs>
    <!-- crafted-depth defs (ported from diagram-primitives.sh) -->
    <filter id="ns" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.42"/></filter>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="16%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <!-- ===== TITLE BAND ===== -->
  <g>
    <g filter="url(#ns)"><rect x="40" y="20" width="820" height="48" rx="6" fill="#2a2a3c" stroke="#bb9af7" stroke-width="2.5"/></g>
    <rect x="40" y="20" width="820" height="48" rx="6" fill="url(#plate)"/>
    <text x="450" y="43" text-anchor="middle" font-size="19" font-weight="bold" fill="#e6e9f0">♻ The KAIZEN covenant — continuous improvement, never finished</text>
    <text x="450" y="61" text-anchor="middle" font-size="12" fill="#cdd2e3">prime law: every pass at least HALVES the remaining distance to perfection · fix upstream once, ship to all</text>
  </g>

  <!-- ============================================================= -->
  <!-- LEFT MOTIF : halve the distance to perfection                  -->
  <!-- ============================================================= -->
  <g>
    <!-- grouping panel (solid dark card so thin labels stay legible on a white page too) -->
    <rect x="48" y="84" width="556" height="398" rx="8" fill="#1b1b27" stroke="#3a4060" stroke-width="1.5"/>
    <text x="326" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6e9f0">Halve the distance to <tspan fill="#bb9af7">perfection</tspan></text>

    <!-- perfection asymptote (dashed) + label above it — the glowing goal line -->
    <text x="326" y="150" text-anchor="middle" font-size="10" fill="#cdd2e3">perfection — asymptotic (the duty is the rate of approach, never the arrival)</text>
    <line x1="84" y1="160" x2="568" y2="160" stroke="#bb9af7" stroke-width="6" opacity="0.35" filter="url(#glow)"/>
    <line x1="84" y1="160" x2="568" y2="160" stroke="#bb9af7" stroke-width="2" stroke-dasharray="7 5"/>

    <!-- baseline -->
    <line x1="84" y1="435" x2="568" y2="435" stroke="#9aa2c0" stroke-width="2"/>

    <!-- "distance to perfection" measure on the left -->
    <line x1="96" y1="160" x2="96" y2="435" stroke="#7f88a8" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="78" y="300" text-anchor="middle" font-size="9.5" fill="#9aa2c0" transform="rotate(-90 78 300)">distance to perfection</text>

    <!-- rising bars: each top closes HALF the remaining gap to the perfection line (y=160) -->
    <g filter="url(#ns)">
      <rect x="118" y="297.5" width="52" height="137.5" rx="3" fill="#2a2740" stroke="#bb9af7" stroke-width="2"/>
      <rect x="210" y="228.8" width="52" height="206.2" rx="3" fill="#2a2740" stroke="#bb9af7" stroke-width="2"/>
      <rect x="302" y="194.4" width="52" height="240.6" rx="3" fill="#2a2740" stroke="#bb9af7" stroke-width="2"/>
      <rect x="394" y="177.2" width="52" height="257.8" rx="3" fill="#2a2740" stroke="#bb9af7" stroke-width="2"/>
      <rect x="486" y="168.6" width="52" height="266.4" rx="3" fill="#2a2740" stroke="#bb9af7" stroke-width="2"/>
    </g>
    <!-- top-light sheen over each bar -->
    <rect x="118" y="297.5" width="52" height="137.5" rx="3" fill="url(#plate)"/>
    <rect x="210" y="228.8" width="52" height="206.2" rx="3" fill="url(#plate)"/>
    <rect x="302" y="194.4" width="52" height="240.6" rx="3" fill="url(#plate)"/>
    <rect x="394" y="177.2" width="52" height="257.8" rx="3" fill="url(#plate)"/>
    <rect x="486" y="168.6" width="52" height="266.4" rx="3" fill="url(#plate)"/>
    <!-- bright lit caps -->
    <rect x="118" y="297.5" width="52" height="5" fill="#bb9af7"/>
    <rect x="210" y="228.8" width="52" height="5" fill="#bb9af7"/>
    <rect x="302" y="194.4" width="52" height="5" fill="#bb9af7"/>
    <rect x="394" y="177.2" width="52" height="5" fill="#bb9af7"/>
    <rect x="486" y="168.6" width="52" height="5" fill="#bb9af7"/>

    <!-- dotted connector through the bar tops (the approach curve) -->
    <polyline points="144,297.5 236,228.8 328,194.4 420,177.2 512,168.6"
              fill="none" stroke="#e0af68" stroke-width="1.6" stroke-dasharray="2 4" opacity="0.85"/>

    <!-- per-bar iteration labels -->
    <text x="144" y="452" text-anchor="middle" font-size="10" fill="#cdd2e3">v1</text>
    <text x="236" y="452" text-anchor="middle" font-size="10" fill="#cdd2e3">v2</text>
    <text x="328" y="452" text-anchor="middle" font-size="10" fill="#cdd2e3">v3</text>
    <text x="420" y="452" text-anchor="middle" font-size="10" fill="#cdd2e3">v4</text>
    <text x="512" y="452" text-anchor="middle" font-size="10" fill="#cdd2e3">v5</text>

    <!-- annotation chip -->
    <rect x="86" y="464" width="480" height="14" rx="4" fill="#2a2a3c" stroke="#9aa2c0" stroke-width="0.8"/>
    <text x="326" y="474" text-anchor="middle" font-size="9.5" fill="#cdd2e3">each pass closes ≥ half the remaining gap — a version no closer than the last has not honoured the covenant</text>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT MOTIF : the PDCA engine                                  -->
  <!-- ============================================================= -->
  <g>
    <rect x="616" y="84" width="248" height="398" rx="8" fill="#1b1b27" stroke="#3a4060" stroke-width="1.5"/>
    <text x="740" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6e9f0">PDCA — the engine</text>

    <!-- track ring -->
    <circle cx="740" cy="280" r="80" fill="none" stroke="#3a4060" stroke-width="12"/>
    <!-- soft glow under each quadrant arc (demoted so the perfection line stays the lead focal) -->
    <g filter="url(#glow)" opacity="0.3">
      <path d="M 740 200 A 80 80 0 0 1 820 280" fill="none" stroke="#7aa2f7" stroke-width="14" stroke-linecap="round"/>
      <path d="M 820 280 A 80 80 0 0 1 740 360" fill="none" stroke="#9ece6a" stroke-width="14" stroke-linecap="round"/>
      <path d="M 740 360 A 80 80 0 0 1 660 280" fill="none" stroke="#e0af68" stroke-width="14" stroke-linecap="round"/>
      <path d="M 660 280 A 80 80 0 0 1 740 200" fill="none" stroke="#bb9af7" stroke-width="14" stroke-linecap="round"/>
    </g>
    <!-- four clockwise quadrant arcs, one per accent -->
    <path d="M 740 200 A 80 80 0 0 1 820 280" fill="none" stroke="#7aa2f7" stroke-width="11" stroke-linecap="round"/>
    <path d="M 820 280 A 80 80 0 0 1 740 360" fill="none" stroke="#9ece6a" stroke-width="11" stroke-linecap="round"/>
    <path d="M 740 360 A 80 80 0 0 1 660 280" fill="none" stroke="#e0af68" stroke-width="11" stroke-linecap="round"/>
    <path d="M 660 280 A 80 80 0 0 1 740 200" fill="none" stroke="#bb9af7" stroke-width="11" stroke-linecap="round"/>
    <!-- clockwise arrowheads at quadrant ends -->
    <polygon points="820,272 828,281 818,288" fill="#7aa2f7"/>
    <polygon points="748,360 739,368 732,358" fill="#9ece6a"/>
    <polygon points="660,288 652,279 662,272" fill="#e0af68"/>
    <polygon points="732,200 741,192 748,202" fill="#bb9af7"/>

    <!-- ring centre -->
    <text x="740" y="278" text-anchor="middle" font-size="17" font-weight="bold" fill="#e6e9f0">PDCA</text>
    <text x="740" y="296" text-anchor="middle" font-size="9" fill="#cdd2e3">measure vs. hypothesis</text>

    <!-- quadrant labels -->
    <text x="740" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#7aa2f7">Plan</text>
    <text x="836" y="284" text-anchor="start" font-size="12" font-weight="bold" fill="#9ece6a">Do</text>
    <text x="740" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0af68">Check</text>
    <text x="644" y="284" text-anchor="end" font-size="12" font-weight="bold" fill="#bb9af7">Act</text>

    <!-- caption -->
    <text x="740" y="428" text-anchor="middle" font-size="10" fill="#cdd2e3">change against a measured hypothesis,</text>
    <text x="740" y="444" text-anchor="middle" font-size="10" fill="#cdd2e3">not a hunch — standardise the win,</text>
    <text x="740" y="460" text-anchor="middle" font-size="10" fill="#cdd2e3">or revert and try again.</text>
  </g>

  <!-- ============================================================= -->
  <!-- FOOTER : the kaizen principles + the three losses             -->
  <!-- ============================================================= -->
  <g>
    <g filter="url(#ns)"><rect x="40" y="498" width="820" height="78" rx="6" fill="#2a2a3c" stroke="#9aa2c0" stroke-width="1.5"/></g>
    <rect x="40" y="498" width="820" height="78" rx="6" fill="url(#plate)"/>
    <text x="450" y="520" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#e6e9f0">the kaizen principles</text>
    <text x="450" y="540" text-anchor="middle" font-size="11" fill="#cdd2e3">standardize-then-improve · small reversible steps · gemba (go &amp; see) · fix-upstream-once · self-cleaving</text>
    <text x="450" y="562" text-anchor="middle" font-size="11" fill="#e0af68">eliminate the three losses — muda (waste) · mura (unevenness) · muri (overburden)</text>
  </g>
</svg>
