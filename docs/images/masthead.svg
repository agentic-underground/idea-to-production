<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 420" font-family="DejaVu Sans, Arial, sans-serif">
<title>idea → production — a Claude Code plugin marketplace</title>
<desc>Animated banner (SMIL): the wordmark "idea → production" over the nine-phase value conveyor on a rich dark band — DISCOVER · IDEATE · DELIVER · DESIGN · BUILD · ASSURE · SECURE · PUBLISH · OPERATE. An amber value-spark sweeps the rail DISCOVER→OPERATE, lighting each glossy teal phase node as it passes; then it travels back along the amber feedback arc (the BUILD ⇄ ASSURE ⇄ SECURE loop — ASSURE &amp; SECURE send work back to DESIGN &amp; BUILD) and a teal spark rides the return loop (OPERATE’s learnings re-enter DISCOVER), each with its label, before the lit nodes fade out in a wave and the cycle repeats. Framed by the i2p front door and concierge greeter. If animation is unavailable the banner shows a coherent start frame.</desc>
<defs>
<radialGradient id="bgvig" cx="50%" cy="42%" r="82%"><stop offset="0%" stop-color="#1b1b2b"/><stop offset="62%" stop-color="#11111b"/><stop offset="100%" stop-color="#08080e"/></radialGradient>
<radialGradient id="wmglow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.5"/><stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/></radialGradient>
<radialGradient id="wmglow2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/><stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/></radialGradient>
<radialGradient id="sheen" cx="38%" cy="30%" r="74%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/><stop offset="44%" stop-color="#ffffff" stop-opacity="0.08"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
<radialGradient id="pool" cx="50%" cy="72%" r="62%"><stop offset="0%" stop-color="#000000" stop-opacity="0"/><stop offset="70%" stop-color="#000000" stop-opacity="0"/><stop offset="100%" stop-color="#000000" stop-opacity="0.30"/></radialGradient>
<filter id="ns" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="3" stdDeviation="3.2" flood-color="#000000" flood-opacity="0.6"/></filter>
<linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/><stop offset="52%" stop-color="#ffffff" stop-opacity="0.018"/><stop offset="100%" stop-color="#000000" stop-opacity="0.14"/></linearGradient>
<filter id="glow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="6"/></filter>
<filter id="softblur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.4"/></filter>
