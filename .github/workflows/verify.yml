name: verify

# Two guards on the marketplace itself:
#   prereqs-contract — the PREREQUISITES ↔ plugins contract: check.sh canonical-copy
#     parity, well-formed requirements.tsv, shipped .mcp.json ⟺ 40-mcp.md, and no
#     Probe cell that fetches-and-executes remote code. See scripts/verify-prereqs.sh.
#   secret-scan-self — cobbler's children: runs gitleaks (SENTINEL's secret-scan tool)
#     over the tree + git history so the marketplace dogfoods its own secret lens.
#     Allowlist: .gitleaks.toml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  prereqs-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify the PREREQUISITES contract
        run: bash scripts/verify-prereqs.sh

  # Cobbler's children (P1-11): the marketplace runs SENTINEL's own secret lens on
  # ITSELF. We invoke gitleaks — the CLI that SENTINEL's /secret-scan skill wraps —
  # directly over the working tree AND full git history, the deterministic credential
  # slice of the otherwise agent-driven audit. The deep PII audit (names, addresses,
  # phone numbers — see plugins/sentinel/skills/pii-audit) stays agent-driven; CI
  # covers the part a CLI can prove. gitleaks' default ruleset already detects the
  # high-signal patterns sentinel targets (AWS AKIA…, -----BEGIN…PRIVATE KEY-----,
  # provider tokens, high-entropy generic keys). The maintainer's known-good noreply
  # email and SENTINEL's own documentation placeholders are allowlisted in
  # .gitleaks.toml so the dogfood flags only REAL findings.
  secret-scan-self:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — gitleaks scans every commit, not just HEAD
      - name: Install gitleaks (pinned release — no @latest, consistent with P1-10)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan tree + git history for committed secrets
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
