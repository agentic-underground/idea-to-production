name: verify

# Three guards on the marketplace itself — two of them "cobbler's children" jobs that
# dogfood the marketplace's OWN lenses on ITSELF, run EXTERNALLY (a self-observation lens
# must survive the thing it observes; a crashed plugin can't observe its own crash):
#   prereqs-contract — the PREREQUISITES ↔ plugins contract: check.sh canonical-copy
#     parity, well-formed requirements.tsv, shipped .mcp.json ⟺ 40-mcp.md, and no
#     Probe cell that fetches-and-executes remote code. See scripts/verify-prereqs.sh.
#   secret-scan-self (P1-11) — the SECURITY slice of the self-observation substrate: runs
#     gitleaks (SECURITY's secret-scan tool) over the tree + git history so the marketplace
#     dogfoods its own secret lens. Allowlist: .gitleaks.toml.
#   marketplace-golden-signals (P2-18) — the HEALTH slice of that SAME substrate: runs
#     OPERATE's observability lens (the four golden signals) over the marketplace's
#     own runtime/health and surfaces a health summary artifact the HUD/CI can read.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  prereqs-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify the PREREQUISITES contract
        run: bash scripts/verify-prereqs.sh

  # Cobbler's children (P1-11): the marketplace runs SECURITY's own secret lens on
  # ITSELF. We invoke gitleaks — the CLI that SECURITY's /scan-for-secrets skill wraps —
  # directly over the working tree AND full git history, the deterministic credential
  # slice of the otherwise agent-driven audit. The deep PII audit (names, addresses,
  # phone numbers — see plugins/secure/skills/scan-for-pii) stays agent-driven; CI
  # covers the part a CLI can prove. gitleaks' default ruleset already detects the
  # high-signal patterns security targets (AWS AKIA…, -----BEGIN…PRIVATE KEY-----,
  # provider tokens, high-entropy generic keys). The maintainer's known-good noreply
  # email and the `secure` plugin's documentation placeholders are allowlisted in
  # .gitleaks.toml so the dogfood flags only REAL findings.
  secret-scan-self:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — gitleaks scans every commit, not just HEAD
      - name: Install gitleaks (pinned release — no @latest, consistent with P1-10)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan tree + git history for committed secrets
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact

  # Cobbler's children (P2-18): the marketplace runs OPERATE's own OBSERVABILITY
  # lens on ITSELF. This is the HEALTH slice of the same self-observation substrate whose
  # SECURITY slice is the secret-scan-self job above — together they dogfood the two lenses
  # the marketplace ships for OPERATE. We invoke the observability skill's golden-signals
  # script (plugins/operate/skills/observability/SKILL.md — the four golden signals:
  # latency, traffic, errors, saturation) mapped onto the marketplace's own deterministic
  # runtime surface (live plugins/skills/agents, manifest validation latency, broken-reference
  # error rate, reference error-budget saturation). It runs EXTERNALLY — not from a session —
  # by design: a self-observability lens must survive the thing it observes, exactly the reason
  # the runtime self-heal detectors live in the hook substrate, not in operate itself.
  # The job uploads the health summary as a CI artifact (a HUD/dashboard feed) and fails only
  # on a hard substrate outage (an unparseable plugin.json or a non-runnable hook), not on
  # mere drift. detect-auto.
  marketplace-golden-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Observe the marketplace's own golden signals (operate observability dogfood)
        run: |
          set -euo pipefail
          bash plugins/operate/skills/observability/scripts/marketplace-golden-signals.sh \
            . --out marketplace-health.json
      - name: Upload marketplace health summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-health
          path: marketplace-health.json
          if-no-files-found: warn
