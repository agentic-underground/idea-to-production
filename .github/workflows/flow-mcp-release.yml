name: flow-mcp release

# Build the flow-mcp MCP binary for every supported platform and publish it as a
# GitHub Release with a SHA256SUMS manifest. The plugin launcher
# (plugins/flow/flow-mcp/bin/flow-mcp) runs a PINNED release: it reads
# bin/RELEASE for the tag and verifies the retrieved asset against the COMMITTED bin/SHA256SUMS
# — so a destination machine runs the server WITHOUT a Rust toolchain and deterministically.
#
# Cut a release (the bump-and-cut flow — see flow-mcp/README.md):
#   1. Bump plugins/flow/flow-mcp/Cargo.toml `version` (NEVER re-cut a tag).
#   2. Push the matching tag:  git tag flow-mcp-v0.2.1 && git push --tags
#   3. This workflow's `preflight` refuses a re-cut tag or a tag≠Cargo version, then builds +
#      publishes the assets + SHA256SUMS.
#   4. Copy the published SHA256SUMS lines into bin/SHA256SUMS, set bin/RELEASE to the tag, commit.
# The launcher trusts ONLY the committed bin/SHA256SUMS, so step 4 is what activates a release.

on:
  push:
    tags: ['flow-mcp-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build/publish (e.g. flow-mcp-v0.1.0)'
        required: true

# Least privilege: only the release job needs the write token; the build jobs
# (rustup/cargo/cross) get read-only.
permissions:
  contents: read

jobs:
  # Gate the whole release on two invariants that keep binary identity honest (defect [92]):
  #   * the tag must NOT already exist as a release — re-cutting a tag ships different bytes under
  #     the same name, the exact failure that stranded machines on a stale release (the [92] incident,
  #     under the service's former server name, the v0.2.0 release before the #97 rename to flow-mcp); and
  #   * the tag version must equal Cargo.toml `version`, so the binary's baked, self-reported
  #     version always matches the tag the pin names.
  preflight:
    name: preflight (no re-cut · Cargo==tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse a re-cut tag and enforce Cargo.toml version == tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          case "$tag" in
            flow-mcp-v*) tagver="${tag#flow-mcp-v}" ;;
            *) echo "::error::tag '$tag' is not of the form flow-mcp-vX.Y.Z"; exit 1 ;;
          esac
          cargover="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
                      plugins/flow/flow-mcp/Cargo.toml | head -n1)"
          if [ "$tagver" != "$cargover" ]; then
            echo "::error::tag version ($tagver) != Cargo.toml version ($cargover) — bump Cargo.toml to match the tag before cutting."
            exit 1
          fi
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::release '$tag' already exists — NEVER re-cut a tag (that is the [92] regression). Bump the version and cut a new tag."
            exit 1
          fi
          echo "preflight OK: $tag is new and matches Cargo.toml ($cargover)."

  build:
    name: build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    # The build steps run inside the crate; bash on every OS (incl. windows-latest).
    defaults:
      run:
        shell: bash
        working-directory: plugins/flow/flow-mcp
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  cross: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, cross: true  }
          - { os: macos-latest,   target: x86_64-apple-darwin,       cross: false }
          - { os: macos-latest,   target: aarch64-apple-darwin,      cross: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    cross: false }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Install cross (Linux targets)
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build (release)
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} --bin flow-mcp
          else
            cargo build --release --locked --target ${{ matrix.target }} --bin flow-mcp
          fi

      - name: Package asset + checksum
        run: |
          ext=""; case "${{ matrix.target }}" in *windows*) ext=".exe" ;; esac
          asset="flow-mcp-${{ matrix.target }}${ext}"
          cp "target/${{ matrix.target }}/release/flow-mcp${ext}" "$asset"
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$asset" > "$asset.sha256"
          else shasum -a 256 "$asset" > "$asset.sha256"; fi
          cat "$asset.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: flow-mcp-${{ matrix.target }}
          path: |
            plugins/flow/flow-mcp/flow-mcp-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # only this job creates the release + uploads assets
    # No working-directory default here: the `dist` steps below resolve `dist`
    # against the workspace root (where download-artifact writes it).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        working-directory: dist
        run: |
          cat ./*.sha256 > SHA256SUMS
          echo "── SHA256SUMS ──"; cat SHA256SUMS

      - name: Publish GitHub Release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          # Upload every platform binary + the aggregate SHA256SUMS (the per-file .sha256 are folded in).
          assets=(SHA256SUMS); for f in flow-mcp-*; do case "$f" in *.sha256) ;; *) assets+=("$f") ;; esac; done
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes "flow-mcp MCP binary for the flow plugin. The plugin launcher runs a PINNED release: it reads bin/RELEASE for the tag and verifies the retrieved asset against the COMMITTED bin/SHA256SUMS. To activate this release, copy this SHA256SUMS into plugins/flow/flow-mcp/bin/SHA256SUMS and set bin/RELEASE to this tag, then commit." \
            "${assets[@]}"
