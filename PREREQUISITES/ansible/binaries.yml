# ansible/binaries.yml — standalone release binaries that have no apt/cargo/npm channel we trust.
# Each tool ships an official installer script or release tarball. Examples below use the vendors'
# documented install methods; pin versions in production. Idempotent via a `creates:` guard.
---
- name: Ensure local bin dir exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"
  tags: [sentinel, foundry]

# --- zig (foundry rust-webapp cross-build) -----------------------------------
- name: zig (pinned release tarball)
  vars:
    zig_version: "0.13.0"
  ansible.builtin.unarchive:
    src: "https://ziglang.org/download/{{ zig_version }}/zig-linux-x86_64-{{ zig_version }}.tar.xz"
    dest: "{{ ansible_env.HOME }}/.local"
    remote_src: true
    creates: "{{ ansible_env.HOME }}/.local/zig-linux-x86_64-{{ zig_version }}/zig"
  tags: [foundry, optional]
# Then symlink {{ HOME }}/.local/zig-linux-x86_64-<ver>/zig into ~/.local/bin (add a file: link task).

# --- SENTINEL scanners --------------------------------------------------------
- name: osv-scanner (Google OSV — all ecosystems)
  ansible.builtin.get_url:
    url: "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64"
    dest: "{{ ansible_env.HOME }}/.local/bin/osv-scanner"
    mode: "0755"
    creates: "{{ ansible_env.HOME }}/.local/bin/osv-scanner"
  tags: [sentinel]

- name: gitleaks (secret scanner) — pinned release tarball
  vars:
    gitleaks_version: "8.21.2"     # bump to the current release; gitleaks ships no install.sh
  ansible.builtin.unarchive:
    src: "https://github.com/gitleaks/gitleaks/releases/download/v{{ gitleaks_version }}/gitleaks_{{ gitleaks_version }}_linux_x64.tar.gz"
    dest: "{{ ansible_env.HOME }}/.local/bin"
    remote_src: true
    creates: "{{ ansible_env.HOME }}/.local/bin/gitleaks"
  tags: [sentinel]

- name: trivy (SCA/IaC/container) via official install script
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
      | sh -s -- -b "{{ ansible_env.HOME }}/.local/bin"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/trivy"
  tags: [sentinel, optional]

- name: grype + syft (SBOM + vuln) via official install scripts
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "{{ ansible_env.HOME }}/.local/bin"
    curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b "{{ ansible_env.HOME }}/.local/bin"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/grype"
  tags: [sentinel, optional]

# trufflehog: `go install github.com/trufflesecurity/trufflehog/v3@latest` (see go.yml) or a release tarball.
