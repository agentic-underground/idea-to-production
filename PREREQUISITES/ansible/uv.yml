# ansible/uv.yml — Python tools via `uv tool install` (assumes uv present; see core-bootstrap.yml).
# `uv tool install` is idempotent (re-running reports "already installed").
---
- name: uv-installed Python tools
  ansible.builtin.command: "uv tool install {{ item }}"
  register: uvt
  changed_when: "'Installed' in uvt.stdout"
  failed_when: uvt.rc != 0 and 'already installed' not in (uvt.stdout + uvt.stderr)
  loop:
    - pip-audit        # security SCA (Python)
    - debugpy          # foundry Python debugger
    - pyright          # foundry Python LSP (alternative to npm install)
    - ruff             # foundry Python lint/diagnostics
  tags: [foundry, security, lsp]

# The Fetch MCP (market-scanner, ideator) is launched ephemerally via `uvx mcp-server-fetch`
# (no install needed). Ensuring uv is present (core-bootstrap.yml) is the only requirement. API
# keys, where a server needs one, are runtime env — never store them in the playbook.
