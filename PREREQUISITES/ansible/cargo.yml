# ansible/cargo.yml — Rust-toolchain tools (assumes rustup/cargo present; see core-bootstrap.yml).
# Uses community.general.cargo. Idempotent.
---
- name: rust-analyzer LSP component
  ansible.builtin.command: rustup component add rust-analyzer
  register: ra
  changed_when: "'installing' in ra.stdout or 'installed' in ra.stdout"
  failed_when: ra.rc != 0 and 'is already installed' not in (ra.stderr + ra.stdout)
  tags: [foundry, lsp]

- name: Cargo-installed tools
  community.general.cargo:
    name: "{{ item.name }}"
    state: present
  loop:
    - { name: typst-cli }        # pressroom Typst engine  (binary: typst)
    - { name: cargo-audit }      # security SCA (Rust)
    - { name: cargo-nextest }    # faster Rust tests       (optional)
    - { name: dioxus-cli }       # dx — rust webapp        (optional)
    - { name: cargo-zigbuild }   # rust->vercel cross-build (optional; also needs zig)
  tags: [foundry, pressroom, security]
# Note: `typst-cli` installs the `typst` binary; `dioxus-cli` installs `dx`.
# `zig` is a standalone download — see binaries.yml.
