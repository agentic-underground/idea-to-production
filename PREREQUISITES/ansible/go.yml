# ansible/go.yml — Go tools (only needed if you build/scan Go; assumes a Go toolchain present).
# `go install` is idempotent at a given version; GOBIN must be on PATH.
---
- name: Go-installed tools
  ansible.builtin.command: "go install {{ item }}"
  environment:
    GOBIN: "{{ ansible_env.HOME }}/go/bin"
  register: goi
  changed_when: true            # go install is quiet; treat as changed (safe to re-run)
  loop:
    - golang.org/x/vuln/cmd/govulncheck@latest    # sentinel SCA (Go)
    - golang.org/x/tools/gopls@latest             # foundry LSP (Go)
  tags: [foundry, sentinel, lsp, go, optional]
